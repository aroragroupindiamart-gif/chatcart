kind = "web"
previewPath = "/admin/"
title = "Chatcart Admin"
version = "1.0.0"
id = "artifacts/chatcart-admin"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/admin/" ]
localPort = 21977

[services.development]
run = "pnpm --filter @workspace/chatcart-admin run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/chatcart-admin", "run", "build" ]
publicDir = "artifacts/chatcart-admin/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21977"
BASE_PATH = "/admin/"
