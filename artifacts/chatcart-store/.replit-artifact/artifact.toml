kind = "web"
previewPath = "/store/"
title = "Chatcart Storefront"
version = "1.0.0"
id = "artifacts/chatcart-store"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/store/" ]
localPort = 26202

[services.development]
run = "pnpm --filter @workspace/chatcart-store run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/chatcart-store", "run", "build" ]
publicDir = "artifacts/chatcart-store/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26202"
BASE_PATH = "/store/"
