kind = "web"
previewPath = "/app/"
title = "Chatcart Dashboard"
version = "1.0.0"
id = "artifacts/chatcart-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/app/" ]
localPort = 23368

[services.development]
run = "pnpm --filter @workspace/chatcart-web run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/chatcart-web", "run", "build" ]
publicDir = "artifacts/chatcart-web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23368"
BASE_PATH = "/app/"
