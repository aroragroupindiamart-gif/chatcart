kind = "mobile"
previewPath = "/"
title = "Chatcart"
version = "1.0.0"
id = "artifacts/chatcart-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 23432

[services.development]
run = "pnpm --filter @workspace/chatcart-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/chatcart-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/chatcart-mobile", "run", "serve" ]

[services.env]
PORT = "23432"
BASE_PATH = "/"
