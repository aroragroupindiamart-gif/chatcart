user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    # Disk cache for proxied product images.
    # Stores up to 2 GB of image responses; entries expire after 7 days idle.
    # After the first request warms the cache, subsequent requests are served
    # entirely from nginx disk — Node.js and DO Spaces are not touched again.
    proxy_cache_path /var/cache/nginx/img
                     levels=1:2
                     keys_zone=img_cache:10m
                     max_size=2g
                     inactive=7d
                     use_temp_path=off;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/javascript application/json application/xml
               image/svg+xml font/woff font/woff2;

    # HTTP — ACME challenge + redirect to HTTPS
    server {
        listen 80;
        listen [::]:80;
        server_name chatcart.in www.chatcart.in;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://chatcart.in$request_uri;
        }
    }

    # HTTPS server
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name chatcart.in;

        ssl_certificate /etc/letsencrypt/live/chatcart.in/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/chatcart.in/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # Allow large file uploads (product images, logos, WA media up to 100 MB)
        client_max_body_size 110m;

        # Product images — cached at nginx level.
        # Must be declared before the generic /api/ block (nginx uses longest-prefix match).
        # Cache-Control: immutable is already set by Node.js on these responses,
        # so nginx holds them for 7 days and clients hold them for 1 year.
        location /api/public/img/ {
            proxy_pass http://api:8080;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;

            proxy_cache img_cache;
            proxy_cache_valid 200 7d;
            proxy_cache_valid 404 1m;
            proxy_cache_use_stale error timeout updating;
            proxy_cache_lock on;
            proxy_cache_lock_timeout 10s;
            add_header X-Cache-Status $upstream_cache_status always;
        }

        # API — proxy to the Node.js container
        location /api/ {
            proxy_pass http://api:8080;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
            proxy_buffering off;
        }

        # Admin panel — /admin/assets/ (long cache for hashed bundles)
        location /admin/assets/ {
            alias /srv/admin/assets/;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Admin panel — /admin/
        location /admin/ {
            alias /srv/admin/;
            try_files $uri $uri/ /admin/index.html;
        }

        # Store — /store/assets/ (long cache for hashed bundles)
        location /store/assets/ {
            alias /srv/store/assets/;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Specific static files in the store root
        location ~ ^/store/(favicon\.svg|opengraph\.jpg|manifest\.json)$ {
            alias /srv/store/$1;
        }

        # Store subdomains — proxied to api for dynamic meta tags
        location ~ ^/store/(?!assets|favicon\.svg|opengraph\.jpg|manifest\.json)([^/]+)(/?|/.*)$ {
            proxy_pass http://api:8080/api/public/storefront-html/$1;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Store index fallback
        location = /store/ {
            alias /srv/store/;
            try_files /index.html =404;
        }

        # Seller dashboard PWA — /app/assets/ (long cache for hashed bundles)
        # Uses root /srv so nginx maps /app/assets/foo → /srv/app/assets/foo
        location /app/assets/ {
            root /srv;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Seller dashboard PWA — /app/
        # root /srv maps /app/foo → /srv/app/foo (no alias quirks)
        # sw.js intentionally inherits no long-cache header so browsers can update it
        location /app/ {
            root /srv;
            try_files $uri $uri/ /app/index.html;
        }

        # Redirect old /dashboard/ path to /app/
        location /dashboard/ {
            return 301 https://chatcart.in/app/;
        }

        # Marketing homepage assets (long cache for hashed bundles)
        location /assets/ {
            root /srv/marketing;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Marketing homepage — /
        location / {
            root /srv/marketing;
            try_files $uri $uri/ /index.html;
        }
    }
}
