services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: chatcart
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: chatcart
    volumes:
      - ./docker-data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatcart -d chatcart"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: "8080"
      WA_SESSION_DIR: /data/wa-session
    volumes:
      - ./docker-data/wa-session:/data/wa-session
    ports:
      - "127.0.0.1:8080:8080"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./artifacts/chatcart-marketing/dist/public:/srv/marketing:ro
      - ./artifacts/chatcart-admin/dist/public:/srv/admin:ro
      - ./artifacts/chatcart-store/dist/public:/srv/store:ro
      - ./artifacts/chatcart-web/dist/public:/srv/dashboard:ro
      - ./docker-data/certbot/conf:/etc/letsencrypt:ro
      - ./docker-data/certbot/www:/var/www/certbot:ro
