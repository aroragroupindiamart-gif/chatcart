services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: chatcart
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: chatcart
    volumes:
      - ./docker-data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatcart -d chatcart"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: "8080"
      WA_SESSION_DIR: /data/wa-session
    volumes:
      - ./docker-data/wa-session:/data/wa-session
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/healthz | grep -q '\"status\":\"ok\"' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  backup:
    image: postgres:16-alpine
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGUSER: chatcart
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: chatcart
      DO_SPACES_KEY: ${DO_SPACES_KEY}
      DO_SPACES_SECRET: ${DO_SPACES_SECRET}
      DO_SPACES_REGION: ${DO_SPACES_REGION}
      DO_SPACES_BUCKET: ${DO_SPACES_BUCKET}
      AWS_ACCESS_KEY_ID: ${DO_SPACES_KEY}
      AWS_SECRET_ACCESS_KEY: ${DO_SPACES_SECRET}
    volumes:
      - ./scripts/backup-db.sh:/backup-db.sh:ro
    entrypoint: >
      sh -c "
        apk add --no-cache aws-cli &&
        echo '0 2 * * * /backup-db.sh >> /var/log/backup.log 2>&1' | crontab - &&
        echo 'Backup service started. Nightly job runs at 02:00 UTC.' &&
        crond -f -d 6
      "

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./artifacts/chatcart-marketing/dist/public:/srv/marketing:ro
      - ./artifacts/chatcart-admin/dist/public:/srv/admin:ro
      - ./artifacts/chatcart-store/dist/public:/srv/store:ro
      - ./artifacts/chatcart-web/dist/public:/srv/app:ro
      - ./docker-data/certbot/conf:/etc/letsencrypt:ro
      - ./docker-data/certbot/www:/var/www/certbot:ro
      - nginx-img-cache:/var/cache/nginx/img

volumes:
  nginx-img-cache:
